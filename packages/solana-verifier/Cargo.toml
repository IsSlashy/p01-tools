[package]
name = "p01-solana-verifier"
version = "1.0.0"
edition = "2021"
description = "On-chain Groth16 proof verification for Solana — by Protocol 01"
license = "MIT"
authors = ["Protocol 01"]
repository = "https://github.com/IsSlashy/Protocol-01"
keywords = ["solana", "groth16", "zk", "bn254", "zero-knowledge", "protocol-01"]
categories = ["cryptography"]

[dependencies]
solana-program = "2"
sha3 = "0.10"
bytemuck = "1.14"

[target.'cfg(target_os = "solana")'.dependencies]
solana-bn254 = "2"

[dev-dependencies]
# No test deps needed — tests use cfg(not(target_os = "solana")) stubs

[workspace]
# Standalone crate — not part of any parent workspace
